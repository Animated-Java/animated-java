        message: There are errors in your blueprint settings! Please fix them before exporting.
        error_item: 'Found an issue with %s:'
      button: Ok
      invalid_rotation:
        message: |-
          Some cubes in your model have an invalid rotations!

          Cubes must have a rotation of -45, -22.5, 0, 22.5, or 45 degrees, and can only be rotated on a single axis at a time when targeting Minecraft versions before 1.21.6.

          If you want to rotate a cube more precisely, or on multiple axes, put it in a bone and rotate the bone instead.

          All of the invalid cubes are outlined in red in the editor. Please fix them before exporting.
        message_post_1_21_6: |-
          Some cubes in your model have an invalid rotations!

          Cubes can only be rotated on a single axis at a time when targeting Minecraft 1.21.6 through 1.21.10.

          If you want to rotate a cube on multiple axes, put it in a bone and rotate the bone instead.

          All of the invalid cubes are outlined in red in the editor. Please fix them before exporting.
      rig_has_textures_but_no_custom_models:
        message: |-
          You have textures applied to your model, but have no custom models (Cubes) to use them!
          Please create some Cubes to use these textures, or remove the textures before exporting.
      rig_has_custom_models_but_no_textures:
        message: |-
          You have custom models (Cubes) in your model, but have no textures applied to them!
          Please apply textures to your Cubes, or remove the Cubes before exporting.

