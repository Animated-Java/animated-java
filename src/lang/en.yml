animated_java:
  menubar:
    label: Animated Java

  format:
    blueprint:
      name: Blueprint

  require:
    fs: Animated Java requires the fs module to export Data Packs & Resource Packs when exporting, to save and load Blueprints, to validate Blueprint settings, and to cache Minecraft assets.

  outliner:
    structure_group:
      title: Structure Group (Will not create an entity)
    interaction:
      title: Interaction

  action:
    open_blueprint_settings:
      name: Blueprint Settings
    open_documentation:
      name: Documentation
    open_changelog:
      name: Changelog
    open_about:
      name: About
    open_display_entity_config:
      name: Display Entity Config
    open_locator_config:
      name: Locator Config
    open_interaction_config:
      name: Interaction Config
    open_item_model_properties:
      name: Item Model Properties
    export:
      name: Export
    export_debug:
      name: Export (Debug)
    export_all:
      name: Export All
      description: |-
        Export all open Blueprint projects.
    export_all_debug:
      name: Export All (Debug)
      description: |-
        Export all open Blueprint projects in debug mode.
    extract:
      name: Extract
      confirm: Confirm Extraction
    create_text_display:
      title: Add Text Display
    create_item_display:
      title: Add Item Display
    create_block_display:
      title: Add Block Display
    create_interaction:
      title: Add Interaction
    copy_display_entity_config:
      name: Copy Display Entity Config
      message: Copied Display Entity Config from "%s"
    paste_display_entity_config:
      name: Paste Display Entity Config
      message: Pasted Display Entity Config from "%s"
    variants:
      create: Create Variant
      duplicate: Duplicate Variant
      open_config: Open Variant Config
      delete: Delete Variant
    upgrade_old_aj_model_loader:
      name: Update .ajmodel
      select_file: Select .ajmodel File
      body: Upgrade your outdated .ajmodel files to the new .ajblueprint format.
      button: Select an .ajmodel File to Upgrade

  popup:
    loading:
      loading: Loading Animated Java...
      success: Animated Java Loaded Successfully!
      offline: |-
        Animated Java Failed to Connect!
        Some features may be unavailable.
    installed_popup:
      title: Thank you for installing!
      close_button: Let's Get Animating!
    incompatability_popup:
      title: Animated Java Incompatibility Detected
      description: |-
        You have plugins installed that are known to cause issues with Animated Java.
        Please disable or uninstall the following plugin(s) and restart Blockbench to use Animated Java:
      disable_button: Disable Plugin
      button:
        disable_all: Disable All Incompatible Plugins
        ignore: Ignore and Continue (Not Recommended)

  plugin_dialog:
    incompatability_notice: |-
      This plugin is known to cause issues with Animated Java.

      You will be unable to install this plugin while Animated Java is installed.

  dialog:
    reset: Reset to Default
    about:
      title: About Animated Java
      close_button: Close
    changelog_dialog:
      title: Animated Java Changelog
    item_properties:
      title: Item Model Properties
      tint_constants: Tint Constants
      description: |-
        [Markdown]
        Constant tints apply fixed color values to an item's tint layers, so the model always uses the same tint colors in-game.
      add_tint: Add Tint
      empty_state: No tint constants configured. Add a tint to start.
      tint_label: Tint Index %s
      remove_tint: Remove
    unexpected_error:
      title: An Unexpected Error Occurred!
      close_button: Close
      copy_error_message_button:
        message: Error Message Copied to Clipboard!
        description: Click to copy the error message to the clipboard.
      paragraph: 'Please report this error by joining our %s and creating a thread in the #animated-java-support channel, or by creating an issue on our {1}. Thank you!'

    entity_count_dialog:
      title: Entity Count
      description: |-
        [Markdown]
        This dialog shows what nodes in your Blueprint will create entities in-game, and how many entities will be created in total.

        Large numbers of entities will cause performance issues in-game. It's recommended to keep the total number of entities as low as possible.

        For more information on Rig Entities, see [Animated Java Docs / Core Concepts / Rigs](https://animated-java.dev/docs/core-concepts/rigs)
      root_entities: Root Entity
      group_entities: Group Entities
      display_entities: Display Entities
      locator_entities: Locator Entities
      camera_entities: Camera Entities
      interaction_entities: Interaction Entities
      total_entities: Total Entities

    blueprint_settings:
      title: Blueprint Settings
      required_footer: Required

      pages:
        general.title: General
        resource_pack.title: Resource Pack
        datapack.title: Data Pack
        rig.title: Rig
        event_functions.title: Event Functions
        plugin.title: Plugin
        misc.title: Misc

      project_settings:
        title: Project
      advanced_settings_warning: Advanced settings should only be used if absolutely needed!
      project_name:
        title: Name
        description: |-
          The Blueprint's filename.

          This will be overwritten if you save the Blueprint with a different name.
      texture_size:
        title: Texture Size
        description: |-
          The resolution of the UV editor.

          This should match the size of the largest texture in your Blueprint.
        warning:
          does_not_match_largest_width: Texture width does not match the width of the largest texture (%s). This may cause rendering issues.
          does_not_match_largest_height: Texture height does not match the height of the largest texture (%s). This may cause rendering issues.
          not_square: Texture width and height are not the same. This may cause rendering issues.
          not_a_power_of_2: Texture size is not a power of two. This may cause rendering issues.
      export_settings:
        title: Export
      blueprint_id:
        title: Blueprint ID
        description: |-
          The ID to use when generating the Resource Pack and Data Pack.

          It is recommended to use a unique ID to avoid conflicts with other Resource Packs and Data Packs.
        error:
          empty_path: Blueprint ID path cannot be empty.
          minecraft_namespace: |-
            [Markdown]
            The `minecraft` namespace is reserved and cannot be used.
          animated_java_global_id: |-
            [Markdown]
            `animated_java:global` is a reserved ID and cannot be used.
          invalid_characters: Blueprint ID can only contain lowercase letters, numbers, and underscores.
      show_render_box:
        title: Show Render Box
        description: When enabled, the render box will be visible in the editor.
      auto_render_box:
        title: Auto-Size Render Box
        description: |-
          When enabled, the render box will be automatically calculated based on the model's geometry.
      render_box:
        title: Render Box Size
        description: |-
          [Markdown]
          The [width and height](https://minecraft.wiki/w/Display#Entity_data) of the rig's display entities.
      view_range:
        title: View Range
        description: |-
          [Markdown]
          The default [view range](https://minecraft.wiki/w/Display#Entity_data) of the rig.
      enable_plugin_mode:
        title: Plugin Mode
        description: |-
          When enabled, the project will be exported as a JSON file designed for use with plugins.
      resource_pack_export_mode:
        title: Resource Pack Export Mode
        options:
          folder: Folder
          zip: Zip
          none: None
      data_pack_export_mode:
        title: Data Pack Export Format
        options:
          folder:
            title: Folder
            description: |-
              Export the Data Pack as a folder and automatically merge with existing files.
          zip:
            title: Zip
            description: |-
              Export the Data Pack as a .zip file.
          none:
            title: None
            description: |-
              Don't export a Data Pack.

      target_minecraft_version:
        title: Target Minecraft Version
        description: |-
          [Markdown]
          The Minecraft version you're targeting. E.g. `26.1.1` or `1.20.4`

          Affects which features you can use and how the export is structured.
        error:
          invalid_version_format: |-
            [Markdown]
            The provided Minecraft version is invalid! Minecraft versions should be in the format `major.minor.patch`, e.g. `1.20.4` or `26.1.1`.
          early_versions_not_supported: Versions below 1.20.4 are not supported.
      resource_pack_settings:
        title: Resource Pack
      enable_advanced_resource_pack_settings:
        title: Advanced Settings
      enable_advanced_resource_pack_folders:
        title: Advanced Folders
      display_item:
        title: Display Item
        description: |-
          The item to use for the rig's models.

          Multiple Blueprints in the same project can use the same item, and they will be merged automatically when exported.
        error:
          no_item_selected: No item selected!
          invalid_item_id:
            no_namespace: The provided item ID is invalid! Item IDs should be in the format `namespace:item_id`.
            whitespace: The provided item ID is invalid! Item IDs should not contain any whitespace.
          item_model_not_found: |-
            The selected item does not have a model file in the vanilla resource pack!

            If you believe this is an error, try restarting Blockbench, and waiting for the AJ loading popup to disappear before opening a Blueprint.
        warning:
          item_does_not_exist: The selected item does not exist in vanilla!
          item_model_not_generated: The selected item does not use `minecraft:item/generated` as its parent. This may cause model issues in-game.
      custom_model_data_offset:
        title: CMD Offset
        description: |-
          Offsets the Custom Model Data (CMD) values used in the display item's predicates by the specified amount.
      resource_pack:
        title: Resource Pack
        description: |-
          [Markdown]
          The root folder of a Resource Pack to export the project to.

          The targeted Resource Pack must contain a `pack.mcmeta` file.
        warning:
          no_assets: Selected folder does not contain an assets folder.
        error:
          empty: Resource Pack folder is required.
          invalid_path: 'Failed to resolve path: %s'
          does_not_exist: Selected path does not exist.
          not_a_dir: Selected path is not a directory.
          no_pack_mcmeta: Selected folder does not contain a pack.mcmeta file.
      data_pack_settings:
        title: Data Pack
      data_pack:
        folder:
          title: Data Pack
          description: |-
            The folder to export the Data Pack to.
          warning:
            no_data: Selected folder does not contain a data folder.
          error:
            empty: Data Pack folder is required.
            invalid_path: 'Failed to resolve path: %s'
            does_not_exist: Selected path does not exist.
            not_a_dir: Selected path is not a directory.
            no_pack_mcmeta: Selected folder does not contain a pack.mcmeta file.
        zip:
          title: Data Pack
          description: |-
            The location to export the Data Pack zip file to.
          error:
            empty: Value cannot be empty!
            invalid_path: 'Failed to resolve path: %s'
            require_zip_extension: Selected file must end with .zip extension.
      on_summon_function:
        title: On-Summon Function
        description: |-
          [Markdown]
          Commands to execute `as` and `at` the root entity when summoned.

          Treat this input as if it were a `.mcfunction` file.

          Supports [MC-Build](https://mcbuild.dev) syntax.
      on_remove_function:
        title: On-Remove Function
        description: |-
          [Markdown]
          Commands to run `as` and `at` the root entity when removed.

          Treat this input as if it were a `.mcfunction` file.

          Supports [MC-Build](https://mcbuild.dev) syntax.
      on_pre_tick_function:
        title: Pre-Tick Function
        description: |-
          [Markdown]
          Commands to run `as` and `at` the root entity every tick *before* Animated Java's own ticking logic.

          Treat this input as if it were a `.mcfunction` file.

          Supports [MC-Build](https://mcbuild.dev) syntax.
      on_post_tick_function:
        title: Post-Tick Function
        description: |-
          [Markdown]
          Commands to run `as` and `at` the root entity every tick *after* Animated Java's own ticking logic.

          Treat this input as if it were a `.mcfunction` file.

      custom_rig_entity_tags:
        title: Custom Rig Entity Tags
        description: |-
          [Markdown]
          A list of tags (separated by commas) to add to ***every entity*** in the rig when summoned.

          E.g. `tag1, tag2, tag3`

      interpolation_duration:
        title: Interpolation Duration
        description: |-
          [Markdown]
          The default [interpolation duration](https://minecraft.wiki/w/Display#Entity_data) of the rig.

          Higher values make animations smoother but less responsive.
      teleportation_duration:
        title: Teleport Duration
        description: |-
          [Markdown]
          The default [teleport duration](https://minecraft.wiki/w/Display#Entity_data) of the rig.

      use_entity_stacking:
        title: Use Entity Stacking
        description: |-
          [Markdown]
          Whether or not to use entity stacking for the rig's bone entities.

          When **enabled**:
          - All bone entities will be mounted on the root entity.
          - Bone rotations will be less precise. (limited to integer degrees)
          - Bone entities can be selected via `on passengers` when executing `as` the root entity.

          When **disabled**:
          - Bone entities will not be mounted on the root entity.
          - Bone rotations will be *much* more precise, enabling much smoother movement when teleporting the rig around.
          - Bone entities cannot be selected via `on passengers`, but can still be accessed via `as_node`.

      auto_update_rig_orientation:
        title: Auto Update Rig Orientation
        description: |-
          [Markdown]
          Syncing node positions and rotations is ***very*** expensive.
          This option allows you to choose whether or not to automatically sync the rig's position and rotation with the root entity every tick.

          When **enabled**, the rig automatically syncs with the root entity's position and rotation.

          When **disabled**, you must use the move function to teleport the rig:

          ```
          execute as @e[tag=aj.<export_namespace>_root] \
              positioned <x> <y> <z> rotated <yaw> <pitch> run \
              function animated_java:<export_namespace>/move
          ```

          It is recommended to **disable** this option on rigs that don't need to move every tick.
      animation_system:
        title: Animation System
        description: |-
          How to store animation data.
        options:
          functions:
            label: Functions
            description: |-
              Store animation data in function files. Best performance, but creates a lot of files.
          storage:
            label: Storage
            description: |-
              Store animation data in command storage. Slower, but creates fewer files.
      baked_animations:
        title: Baked Animations
        description: |-
          [Markdown]
          Whether or not to bake the exported animations.
          Baked animations have their frames pre-calculated and stored in the exported JSON file, reducing the complexity of rendering the model in-game.
          Some Plugins may require this to be enabled to function correctly.
      json_file:
        title: JSON File
        description: The path to the JSON file to export the project to.
        error:
          invalid_path: Invalid file path!
          no_file_selected: No file selected!
          not_a_file: The selected path is not a file!

    display_entity:
      title: Display Entity Config for "%s"
      node_options:
        title: Node
      per_variant_options:
        title: Per-Variant
      on_summon_function:
        title: On-Summon Function
        description: |-
          [Markdown]
          Commands to run `as` the display entity when summoned.

          Treat this input as if it were a `.mcfunction` file.

          Supports [MC-Build](https://mcbuild.dev) syntax.
      on_apply_function:
        title: On-Apply Function
        description: |-
          [Markdown]
          Commands to run `as` the display entity when the variant is applied.

          Treat this input as if it were a `.mcfunction` file.

          Supports [MC-Build](https://mcbuild.dev) syntax.
      custom_name:
        title: Custom Name
        description: The custom name of the node.
        invalid_json:
          error: |-
            Invalid JSON Text!
            %s
      custom_name_visible:
        title: Custom Name Visible
        description: Whether or not the custom name should always be visible.
      glowing:
        title: Glowing
        description: Whether or not the node should glow in-game.
      override_glow_color:
        title: Override Glow Color
        description: Whether or not to override the default glow color.
      glow_color:
        title: Glow Color
        description: The color of the glow.
      shadow_radius:
        title: Shadow Radius
        description: The radius of the shadow.
      shadow_strength:
        title: Shadow Strength
        description: The strength of the shadow.
      override_brightness:
        title: Override Brightness
        description: Whether or not to override the default brightness.
      brightness_override:
        title: Brightness
        description: The brightness of the node. This should be a value between 0 and 15.
      sky_brightness:
        title: Sky Brightness
        description: The sky light brightness of the node. This should be a value between 0 and 15.
      block_brightness:
        title: Block Brightness
        description: The block light brightness of the node. This should be a value between 0 and 15.
      use_custom_brightness:
        title: Use Custom Brightness
        description: Whether or not to enable the custom brightness override for the node.
      custom_brightness:
        title: Custom Brightness
        description: The custom brightness of the node. This should be a value between 0 and 15.
      enchanted:
        title: Enchanted
        description: Whether or not the node should be enchanted.
      invisible:
        title: Invisible
        description: Whether or not the node should be invisible.
      billboard:
        title: Billboard
        description: |-
          [Markdown]
          Controls if this nodes model should pivot to face player when rendered.
          - **Fixed**: Both vertical and horizontal angles are fixed.
          - **Vertical**: Pivots around vertical axis.
          - **Horizontal**: Pivots around horizontal axis.
          - **Center**: Pivots around center point.
        options:
          fixed: Fixed
          vertical: Vertical
          horizontal: Horizontal
          center: Center
    locator_config:
      title: Locator Config
      plugin_mode_warning: |-
        Plugin Mode is enabled! Locators have no configuration in Plugin Mode.
        Instead, use the Plugin API to add custom functionality to your Locators.
        For more information, see the Official Plugin API documentation for more information.
      use_entity:
        title: Use Entity
        description: |-
          When enabled, the Locator will summon and use an entity to represent itself in-game.
      entity_type:
        title: Entity Type
        description: The type of entity to attach to the Locator.
        error:
          empty: Entity Type cannot be empty!
        warning:
          invalid: The selected entity type doesn't exist in Minecraft %s
      sync_passenger_rotation:
        title: Sync Passenger Rotation
        description: Automatically sync the rotation of the Locator's passenger entities.
      on_summon_function:
        title: On-Summon Function
        description: |-
          [Markdown]
          Commands to run `as` the root entity and `at` the Locator's position when the rig is summoned.

          Supports [MC-Build](https://mcbuild.dev) syntax.
        description_with_use_entity: |-
          [Markdown]
          Commands to run `as` and `at` the Locator's entity when summoned.

          Supports [MC-Build](https://mcbuild.dev) syntax.
      on_remove_function:
        title: On-Remove Function
        description: |-
          [Markdown]
          Commands to run `as` the root entity and `at` the Locator's position when the rig is removed.

          Supports [MC-Build](https://mcbuild.dev) syntax.
        description_with_use_entity: |-
          [Markdown]
          Commands to run `as` and `at` the Locator's entity when removed.

          Supports [MC-Build](https://mcbuild.dev) syntax.
      on_tick_function:
        title: On-Tick Function
        description: |-
          [Markdown]
          Commands to run `at` the Locator's position every tick.

          Supports [MC-Build](https://mcbuild.dev) syntax.
        description_with_use_entity: |-
          [Markdown]
          Commands to run `as` and `at` the Locator's entity every tick.

    interaction_config:
      title: Interaction Config
      plugin_mode_warning: |-
        Plugin Mode is enabled! Interaction have no configuration in Plugin Mode.
        Instead, use the Plugin API to add custom functionality to your Interaction.
        For more information, see the Official Plugin API documentation for more information.

      response:
        title: Response
        description: Whether interacting with this Interaction should trigger a response (hand animation / attack sound).

      on_summon_function:
        title: On-Summon Function
        description: |-
          [Markdown]
          Commands to run `as` and `at` this Interaction when summoned.

          Supports [MC-Build](https://mcbuild.dev) syntax.

      on_interact_function:
        title: On-Interact Function
        description: |-
          [Markdown]
          Commands to run `as` and `at` this Interaction when a player interacts with it.

          You can use `execute on target` to select the player who initiated the interaction.

          Supports [MC-Build](https://mcbuild.dev) syntax.

      on_attack_function:
        title: On-Attack Function
        description: |-
          [Markdown]
          Commands to run `as` and `at` this Interaction when a player attacks it.

          You can use `execute on attacker` to select the player who initiated the attack.

          Supports [MC-Build](https://mcbuild.dev) syntax.

      on_remove_function:
        title: On-Remove Function
        description: |-
          [Markdown]
          Commands to run `as` and `at` this Interaction when removed.

          Supports [MC-Build](https://mcbuild.dev) syntax.

      on_tick_function:
        title: On-Tick Function
        description: |-
          [Markdown]
          Commands to run `as` and `at` this Interaction every tick.

          Supports [MC-Build](https://mcbuild.dev) syntax.

    text_display_config:
      title: Text Display Config
      use_nbt:
        title: Use NBT
        description: Whether or not to use NBT to configure the text display instead of settings.
        use_nbt_warning: Using NBT will override all other settings, and any changes you make will not be visible in the editor. Only use this if you know what you're doing!
      inherit_settings:
        title: Inherit Settings
        description: Whether or not to inherit the settings from the parent text display.
      glowing:
        title: Glowing
        description: Whether or not the text display should glow in-game.
      override_glow_color:
        title: Override Glow Color
        description: Whether or not to override the default glow color.
      glow_color:
        title: Glow Color
        description: The color of the glow.
      shadow_radius:
        title: Shadow Radius
        description: The radius of the shadow.
      shadow_strength:
        title: Shadow Strength
        description: The strength of the shadow.
      override_brightness:
        title: Override Brightness
        description: Whether or not to override the default brightness.
      brightness_override:
        title: Brightness
        description: The brightness of the text display. This should be a value between 0 and 15.
      sky_brightness:
        title: Sky Brightness
        description: The sky light brightness of the text display. This should be a value between 0 and 15.
      block_brightness:
        title: Block Brightness
        description: The block light brightness of the text display. This should be a value between 0 and 15.
      use_custom_brightness:
        title: Use Custom Brightness
        description: Whether or not to enable the custom brightness override for the bone.
      custom_brightness:
        title: Custom Brightness
        description: The custom brightness of the bone. This should be a value between 0 and 15.
      invisible:
        title: Invisible
        description: Whether or not the text display should be invisible.
      nbt:
        title: NBT
        description: The NBT to apply to the text display.
    bone_config:
      vanilla_item_model:
        title: Vanilla Item Model
        description: |-
          If set, the bone will render as a vanilla item model.
          This will overwrite the bone's existing cubes.
    vanilla_block_display_config:
      title: Block Display Config
    vanilla_block_display:
      custom_name:
        title: Custom Name
        description: The custom name of the block display.
        invalid_json:
          error: |-
            Invalid JSON Text!
            %s
      custom_name_visible:
        title: Custom Name Visible
        description: Whether or not the custom name should always be visible.
    vanilla_item_display_config:
      title: Item Display Config
    vanilla_item_display:
      custom_name:
        title: Custom Name
        description: The custom name of the item display.
        invalid_json:
          error: |-
            Invalid JSON Text!
            %s
      custom_name_visible:
        title: Custom Name Visible
        description: Whether or not the custom name should always be visible.
    variant_config:
      title: Variant Config
      variant_display_name: Display Name
      variant_display_name.description: Used to identify the Variant in the editor, and in error messages.
      generate_name_from_display_name: Generate Name From Display Name
      generate_name_from_display_name.description: Whether or not to generate the Name automatically from the Display Name.
      variant_name: Name
      variant_name.description: Used to identify the Variant in the exported Resource Pack and Data Pack.
      texture_map:
        title: Texture Map
        description: A map of which textures to swap out when applying this Variant.
        create_new_mapping: Create New Mapping
        no_mappings: Variant has no mapped textures.
      bone_lists:
        description: |-
          Specify which nodes the Variant should affect.

          Nodes in the included list will be changed when applying the Variant.

          Nodes in the excluded list will remain unchanged.
      excluded_nodes:
        title: Excluded Nodes
        description: A list of nodes to exclude from the Variant. These nodes will remain unchanged when applying the Variant.
      included_nodes:
        title: Included Nodes
        description: A list of nodes to include in the Variant. Only these nodes will be changed when applying the Variant.
      swap_columns_button:
        tooltip: Swap Lists
    upgrade_old_aj_model_loader:
      title: Update .ajmodel
    animation_properties:
      title: Animation Properties (%s)
      animation_name:
        title: Animation Name
        description: The name of the animation.
        error:
          empty: The animation name cannot be empty!
          invalid_characters: The animation name contains invalid characters! Animation names should only contain letters, numbers, underscores, and periods.
      loop_mode:
        title: Loop Mode
        description: |-
          [Markdown]
          - Once: The animation will play once, then reset to the first frame.
          - Hold: The animation will play once and hold the last frame.
          - Loop: The animation will loop indefinitely.
        options:
          once: Once
          hold: Hold
          loop: Loop
      loop_delay:
        title: Loop Delay
        description: |-
          The number of ticks to wait before restarting the animation when in Loop mode.

          E.g. A value of 20 will cause the animation to wait 1 second before restarting.
      bone_lists:
        description: |-
          Specify which nodes the animation should affect.

          Nodes in the included list will be modified by the animation.

          Nodes in the excluded list will remain unchanged.
      excluded_nodes:
        title: Excluded Nodes
        description: A list of nodes to exclude from the animation. These nodes will remain unchanged when applying the animation.
      included_nodes:
        title: Included Nodes
        description: A list of nodes to include in the animation. Only these nodes will be modified by the animation.
      swap_columns_button:
        tooltip: Swap Lists
    export_progress:
