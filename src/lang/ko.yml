          모델의 일부 큐브에 잘못된 회전 값이 있습니다!

          Minecraft 1.21.6 ~ 1.21.10을 타겟으로 할 때, 큐브는 한 번에 하나의 축에서만 회전할 수 있습니다.

          큐브를 여러 축으로 회전시키려면, 본에 넣고 본을 회전시키세요.

          잘못된 큐브들은 모두 에디터에서 빨간색으로 표시됩니다. 내보내기 전에 수정해 주세요.
