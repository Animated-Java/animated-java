animated_java:
  menubar:
    label: Animated Java

  format:
    blueprint:
      name: 블루프린트

  require:
    fs: Animated Java는 리소스 팩 및 데이터 팩 내보내기, 블루프린트 저장 및 불러오기, 블루프린트 설정 검증, Minecraft 에셋 캐싱을 위해 fs 모듈이 필요합니다.

  outliner:
    structure_group:
      title: 구조 그룹 (엔티티를 생성하지 않음)

  action:
    open_blueprint_settings:
      name: 블루프린트 설정
    open_documentation:
      name: 문서
    open_changelog:
      name: 변경 사항
    open_about:
      name: 정보
    open_display_entity_config:
      name: 디스플레이 엔티티 설정
    open_locator_config:
      name: 로케이터 설정
    open_interaction_config:
      name: 인터랙션 설정
    export:
      name: 내보내기
    export_debug:
      name: 내보내기 (디버그)
    export_all:
      name: 모두 내보내기
      description: |-
        열려 있는 모든 블루프린트 프로젝트를 내보냅니다.
    export_all_debug:
      name: 모두 내보내기 (디버그)
      description: |-
        열려 있는 모든 블루프린트 프로젝트를 디버그 모드로 내보냅니다.
    extract:
      name: 추출
      confirm: 추출 확인
    create_text_display:
      title: 텍스트 디스플레이 추가
    create_item_display:
      title: 아이템 디스플레이 추가
    create_block_display:
      title: 블록 디스플레이 추가
    copy_display_entity_config:
      name: 디스플레이 엔티티 설정 복사
      message: '"%s"의 디스플레이 엔티티 설정을 복사했습니다'
    paste_display_entity_config:
      name: 디스플레이 엔티티 설정 붙여넣기
      message: '"%s"의 디스플레이 엔티티 설정을 붙여넣었습니다'
    variants:
      create: 배리언트 생성
      duplicate: 배리언트 복제
      open_config: 배리언트 설정 열기
      delete: 배리언트 삭제
    upgrade_old_aj_model_loader:
      name: .ajmodel 업데이트
      select_file: .ajmodel 파일 선택
      body: 오래된 .ajmodel 파일을 새로운 .ajblueprint 형식으로 업그레이드합니다.
      button: 업그레이드할 .ajmodel 파일 선택

  popup:
    loading:
      loading: Animated Java 불러오는 중...
      success: Animated Java를 성공적으로 불러왔습니다!
      offline: |-
        Animated Java 연결에 실패했습니다!
        일부 기능을 사용할 수 없을 수 있습니다.
    installed_popup:
      title: 설치해 주셔서 감사합니다!
      close_button: 애니메이션을 시작해 봅시다!
    incompatability_popup:
      title: Animated Java 호환성 문제 감지됨
      description: |-
        Animated Java와 충돌하는 것으로 알려진 플러그인이 설치되어 있습니다.
        Animated Java를 사용하려면 다음 플러그인을 비활성화하거나 삭제한 뒤 Blockbench를 재시작해 주세요:
      disable_button: 플러그인 비활성화
      button:
        disable_all: 호환되지 않는 플러그인 모두 비활성화
        ignore: 무시하고 계속 진행 (권장하지 않음)

  plugin_dialog:
    incompatability_notice: |-
      이 플러그인은 Animated Java와 충돌하는 것으로 알려져 있습니다.

      Animated Java가 설치되어 있는 동안에는 이 플러그인을 설치할 수 없습니다.

  dialog:
    reset: 기본값으로 재설정
    about:
      title: Animated Java 정보
      close_button: 닫기
    changelog_dialog:
      title: Animated Java 변경 사항
    unexpected_error:
      title: 예기치 않은 오류가 발생했습니다!
      close_button: 닫기
      copy_error_message_button:
        message: 오류 메시지를 클립보드에 복사했습니다!
        description: 클릭하여 오류 메시지를 클립보드에 복사합니다.
      paragraph: '이 오류를 보고하려면 저희 %s에 참여하여 #animated-java-support 채널에 스레드를 만들어 주시거나, {1}에 이슈를 등록해 주세요. 감사합니다!'

    blueprint_settings:
      title: 블루프린트 설정

      pages:
        general.title: 일반
        resource_pack.title: 리소스 팩
        datapack.title: 데이터 팩
        rig.title: 리그
        event_functions.title: 이벤트 함수
        plugin.title: 플러그인
        misc.title: 기타

      project_settings:
        title: 프로젝트
      advanced_settings_warning: 고급 설정은 반드시 필요한 경우에만 사용해야 합니다!
      project_name:
        title: 이름
        description: |-
          블루프린트의 파일 이름입니다.

          블루프린트를 다른 이름으로 저장하면 이 값이 덮어써집니다.
      texture_size:
        title: 텍스처 크기
        description: |-
          UV 에디터의 해상도입니다.

          블루프린트 내에서 가장 큰 텍스처의 크기와 일치해야 합니다.
        warning:
          does_not_match_largest_width: 텍스처 너비가 가장 큰 텍스처의 너비(%s)와 일치하지 않습니다. 렌더링 문제가 발생할 수 있습니다.
          does_not_match_largest_height: 텍스처 높이가 가장 큰 텍스처의 높이(%s)와 일치하지 않습니다. 렌더링 문제가 발생할 수 있습니다.
          not_square: 텍스처의 너비와 높이가 같지 않습니다. 렌더링 문제가 발생할 수 있습니다.
          not_a_power_of_2: 텍스처 크기가 2의 거듭제곱이 아닙니다. 렌더링 문제가 발생할 수 있습니다.
      export_settings:
        title: 내보내기
      blueprint_id:
        title: 블루프린트 ID
        description: |-
          리소스 팩과 데이터 팩을 생성할 때 사용할 ID입니다.

          다른 리소스 팩 및 데이터 팩과의 충돌을 피하려면 고유한 ID를 사용하는 것이 좋습니다.
        error:
          empty_path: 블루프린트 ID 경로는 비어 있을 수 없습니다.
          minecraft_namespace: |-
            [Markdown]
            `minecraft` 네임스페이스는 예약되어 있어 사용할 수 없습니다.
          animated_java_global_id: |-
            [Markdown]
            `animated_java:global`은 예약된 ID이므로 사용할 수 없습니다.
          invalid_characters: 블루프린트 ID는 영어 소문자, 숫자, 밑줄(_)만 포함할 수 있습니다.
      show_render_box:
        title: 렌더 박스 표시
        description: 활성화하면 에디터에서 렌더 박스가 표시됩니다.
      auto_render_box:
        title: 렌더 박스 자동 크기 조절
        description: |-
          활성화하면 모델의 지오메트리를 기반으로 렌더 박스가 자동으로 계산됩니다.
      render_box:
        title: 렌더 박스 크기
        description: |-
          [Markdown]
          리그 디스플레이 엔티티의 [너비와 높이](https://minecraft.wiki/w/Display#Entity_data)입니다.
      view_range:
        title: 시야 범위
        description: |-
          [Markdown]
          리그의 기본 [시야 범위(view range)](https://minecraft.wiki/w/Display#Entity_data)입니다.
      enable_plugin_mode:
        title: 플러그인 모드
        description: |-
          활성화하면 프로젝트가 플러그인에서 사용할 수 있도록 설계된 JSON 파일로 내보내집니다.
      resource_pack_export_mode:
        title: 리소스 팩 내보내기 모드
        options:
          folder: 폴더
          zip: Zip
          none: 없음
      data_pack_export_mode:
        title: 데이터 팩 내보내기 형식
        options:
          folder:
            title: 폴더
            description: |-
              데이터 팩을 폴더로 내보내고 기존 파일과 자동으로 병합합니다.
          zip:
            title: Zip
            description: |-
              데이터 팩을 .zip 파일로 내보냅니다.
          none:
            title: 없음
            description: |-
              데이터 팩을 내보내지 않습니다.

      target_minecraft_version:
        title: 대상 Minecraft 버전
        description: |-
          [Markdown]
          타겟으로 하는 Minecraft 버전입니다. 예: `26.1.1` 또는 `1.20.4`

          사용할 수 있는 기능과 내보내기 구조에 영향을 줍니다.
        error:
          invalid_version_format: |-
            [Markdown]
            제공된 Minecraft 버전이 올바르지 않습니다! Minecraft 버전은 `major.minor.patch` 형식이어야 합니다. 예: `1.20.4` 또는 `26.1.1`.
          early_versions_not_supported: 1.20.4 미만 버전은 지원되지 않습니다.
      resource_pack_settings:
        title: 리소스 팩
      enable_advanced_resource_pack_settings:
        title: 고급 설정
      enable_advanced_resource_pack_folders:
        title: 고급 폴더
      display_item:
        title: 디스플레이 아이템
        description: |-
          리그의 모델에 사용할 아이템입니다.

          같은 프로젝트의 여러 블루프린트가 동일한 아이템을 사용할 수 있으며, 내보낼 때 자동으로 병합됩니다.
        error:
          no_item_selected: 선택된 아이템이 없습니다!
          invalid_item_id:
            no_namespace: 입력한 아이템 ID가 올바르지 않습니다! 아이템 ID는 `namespace:item_id` 형식이어야 합니다.
            whitespace: 입력한 아이템 ID가 올바르지 않습니다! 아이템 ID에는 공백이 포함될 수 없습니다.
          item_model_not_found: |-
            선택한 아이템의 모델 파일이 바닐라 리소스 팩에 존재하지 않습니다!

            오류로 보인다면 Blockbench를 재시작하고, 블루프린트를 열기 전에 AJ 로딩 팝업이 사라질 때까지 기다려 보세요.
        warning:
          item_does_not_exist: 선택한 아이템이 바닐라에 존재하지 않습니다!
          item_model_not_generated: 선택한 아이템이 `minecraft:item/generated`를 부모 모델로 사용하지 않습니다. 게임 내에서 모델 문제가 발생할 수 있습니다.
      custom_model_data_offset:
        title: CMD 오프셋
        description: |-
          디스플레이 아이템의 프레디케이트에 사용되는 커스텀 모델 데이터(CMD) 값을 지정한 만큼 오프셋합니다.
      resource_pack:
        title: 리소스 팩
        description: |-
          [Markdown]
          프로젝트를 내보낼 리소스 팩의 루트 폴더입니다.

          대상 리소스 팩에는 `pack.mcmeta` 파일이 포함되어 있어야 합니다.
        warning:
          no_assets: 선택한 폴더에 assets 폴더가 없습니다.
        error:
          empty: 리소스 팩 폴더는 필수입니다.
          invalid_path: '경로 확인에 실패했습니다: %s'
          does_not_exist: 선택한 경로가 존재하지 않습니다.
          not_a_dir: 선택한 경로는 폴더가 아닙니다.
          no_pack_mcmeta: 선택한 폴더에 pack.mcmeta 파일이 없습니다.
      data_pack_settings:
        title: 데이터 팩
      data_pack:
        folder:
          title: 데이터 팩
          description: |-
            데이터 팩을 내보낼 폴더입니다.
          warning:
            no_data: 선택한 폴더에 data 폴더가 없습니다.
          error:
            empty: 데이터 팩 폴더는 필수입니다.
            invalid_path: '경로 확인에 실패했습니다: %s'
            does_not_exist: 선택한 경로가 존재하지 않습니다.
            not_a_dir: 선택한 경로는 폴더가 아닙니다.
            no_pack_mcmeta: 선택한 폴더에 pack.mcmeta 파일이 없습니다.
        zip:
          title: 데이터 팩
          description: |-
            데이터 팩 zip 파일을 내보낼 위치입니다.
          error:
            empty: 값은 비어 있을 수 없습니다!
            invalid_path: '경로 확인에 실패했습니다: %s'
            require_zip_extension: 선택한 파일은 .zip 확장자로 끝나야 합니다.
      on_summon_function:
        title: 소환 시 함수
        description: |-
          [Markdown]
          소환되었을 때 루트 엔티티를 기준으로 `as`, `at`로 실행할 명령어입니다.

          이 입력은 `.mcfunction` 파일처럼 취급됩니다.

          [MC-Build](https://mcbuild.dev) 문법을 지원합니다.
      on_remove_function:
        title: 제거 시 함수
        description: |-
          [Markdown]
          제거되었을 때 루트 엔티티를 기준으로 `as`, `at`로 실행할 명령어입니다.

          이 입력은 `.mcfunction` 파일처럼 취급됩니다.

          [MC-Build](https://mcbuild.dev) 문법을 지원합니다.
      on_pre_tick_function:
        title: Pre-Tick 함수
        description: |-
          [Markdown]
          매 틱마다 Animated Java의 자체 틱 로직 *이전에* 루트 엔티티를 기준으로 `as`, `at`로 실행할 명령어입니다.

          이 입력은 `.mcfunction` 파일처럼 취급됩니다.

          [MC-Build](https://mcbuild.dev) 문법을 지원합니다.
      on_post_tick_function:
        title: Post-Tick 함수
        description: |-
          [Markdown]
          매 틱마다 Animated Java의 자체 틱 로직 *이후에* 루트 엔티티를 기준으로 `as`, `at`로 실행할 명령어입니다.

          이 입력은 `.mcfunction` 파일처럼 취급됩니다.

      custom_rig_entity_tags:
        title: 사용자 지정 리그 엔티티 태그
        description: |-
          [Markdown]
          소환 시 리그의 ***모든 엔티티***에 추가할 태그 목록입니다(쉼표로 구분).

          예: `tag1, tag2, tag3`

      interpolation_duration:
        title: 보간 시간
        description: |-
          [Markdown]
          리그의 기본 [보간 시간(interpolation duration)](https://minecraft.wiki/w/Display#Entity_data)입니다.

          값이 클수록 애니메이션이 부드러워지지만 반응성은 떨어집니다.
      teleportation_duration:
        title: 텔레포트 시간
        description: |-
          [Markdown]
          리그의 기본 [텔레포트 시간(teleport duration)](https://minecraft.wiki/w/Display#Entity_data)입니다.

      use_entity_stacking:
        title: 엔티티 스태킹 사용
        description: |-
          [Markdown]
          리그의 본 엔티티에 엔티티 스태킹을 사용할지 여부입니다.

          **활성화** 시:
          - 모든 본 엔티티가 루트 엔티티에 탑승됩니다.
          - 본 회전 정밀도가 떨어집니다. (정수 각도로 제한됨)
          - 루트 엔티티를 기준으로 `as`로 실행할 때 `on passengers`로 본 엔티티를 선택할 수 있습니다.

          **비활성화** 시:
          - 본 엔티티가 루트 엔티티에 탑승되지 않습니다.
          - 본 회전이 *훨씬* 더 정밀해져, 리그를 텔레포트할 때의 움직임이 훨씬 부드러워집니다.
          - 본 엔티티를 `on passengers`로 선택할 수 없지만, `as_node`로는 여전히 접근할 수 있습니다.

      auto_update_rig_orientation:
        title: 리그 방향 자동 업데이트
        description: |-
          [Markdown]
          노드의 위치와 회전을 동기화하는 작업은 비용이 ***매우*** 큽니다.
          이 옵션은 리그의 위치와 회전을 매 틱마다 루트 엔티티에 자동으로 동기화할지 여부를 선택합니다.

          **활성화**되면 리그가 자동으로 루트 엔티티의 위치 및 회전과 동기화됩니다.

          **비활성화**되면 리그를 텔레포트하기 위해 move 함수를 직접 사용해야 합니다:

          ```
          execute as @e[tag=aj.<export_namespace>_root] \
              positioned <x> <y> <z> rotated <yaw> <pitch> run \
              function animated_java:<export_namespace>/move
          ```

          매 틱 이동할 필요가 없는 리그에서는 이 옵션을 **비활성화**하는 것이 좋습니다.
